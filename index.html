<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kibo Modz Dashboard Pro - TEST MODE</title>
    <style>
        :root { --bg: #111425; --card: #1a1f37; --input: #111425; --accent: #7c3aed; --text-gray: #94a3b8; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        #lock-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90vh; }
        .lock-box { background: var(--card); padding: 30px; border-radius: 12px; width: 90%; max-width: 350px; text-align: center; border: 1px solid #2d3748; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        #dashboard { display: none; background: var(--card); border-radius: 15px; padding: 20px; max-width: 800px; margin: 10px auto; border: 1px solid #2d3748; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 650px) { .grid-container { grid-template-columns: 1fr; } }
        .input-group { margin-bottom: 12px; }
        .label { font-size: 10px; font-weight: bold; color: var(--text-gray); margin-bottom: 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; background: var(--input); border: 1px solid #2d3748; color: white; border-radius: 8px; font-size: 13px; outline: none; box-sizing: border-box; }
        .btn-save { grid-column: span 2; background: linear-gradient(to right, #6d28d9, #9333ea); border: none; padding: 15px; color: white; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; text-transform: uppercase; width: 100%; }
        #cf-loading { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(17,20,37,0.98); z-index: 999; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .loader { border: 4px solid #2d3748; border-top: 4px solid #7c3aed; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tool-btn { flex: 1; background: #2d3748; color: #94a3b8; border: 1px solid #3d4a66; padding: 10px; border-radius: 6px; font-size: 11px; cursor: pointer; }
        footer { text-align: center; color: var(--text-gray); font-size: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-box">
            <h2 style="margin-top:0; color: #7c3aed; letter-spacing: 2px;">KIBO AUTH</h2>
            <p style="font-size: 12px; color: var(--text-gray); margin-bottom: 20px;">VUI LÒNG NHẬP ID ĐỂ TIẾP TỤC</p>
            <input type="number" id="user-id" placeholder="Nhập ID Game...">
            <button onclick="testStep1()" style="background:#7c3aed; color:white; border:none; padding:12px; width:100%; border-radius:6px; margin-top:15px; font-weight:bold; cursor:pointer;">XÁC THỰC</button>
        </div>
    </div>

    <div id="dashboard">
        <div class="grid-container">
            <div class="input-group"><div class="label">👤 DISPLAY NAME</div><input type="text" value="Boong Chu Pro"></div>
            <div class="input-group"><div class="label">🆔 DISPLAY UID</div><input type="text" id="target-uid" readonly></div>
            <div class="input-group"><div class="label">💎 DIAMONDS</div><input type="number" value="9999999"></div>
            <div class="input-group"><div class="label">🟡 GOLD</div><input type="number" value="999999999"></div>
            <div class="input-group"><div class="label">🏆 RANK SCORE</div><input type="number" value="95600"></div>
            <div class="input-group"><div class="label">⭐ LEVEL</div><input type="number" value="100"></div>
            
            <div style="grid-column: span 2; margin-top: 10px;">
                <p style="font-size:10px; color:#7c3aed; font-weight:bold; margin-bottom:8px;">HỖ TRỢ TẢI XUỐNG</p>
                <div style="display: flex; gap: 10px;">
                    <button class="tool-btn" onclick="alert('Đang tải Launcher...')">0xKIBO Launcher</button>
                    <button class="tool-btn" onclick="alert('Đang tải Config...')">ProxyPin Config</button>
                </div>
            </div>

            <button class="btn-save" onclick="testStep2()">💾 LƯU VÀ KÍCH HOẠT MOD</button>
        </div>
        <footer>© 2026 kibomodz.online</footer>
    </div>

    <div id="cf-loading">
        <div class="loader"></div>
        <p id="loading-text" style="margin-top:20px; font-weight: bold; color: #7c3aed;"></p>
        <p id="sub-text" style="font-size: 12px; color: var(--text-gray);"></p>
    </div>

    <script>
        function testStep1() {
            let id = document.getElementById('user-id').value;
            if(id.length >= 5) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('cf-loading').style.display = 'flex';
                document.getElementById('loading-text').innerText = "CLOUDFLARE VERIFYING...";
                document.getElementById('sub-text').innerText = "Đang kiểm tra bảo mật cho ID: " + id;
                
                setTimeout(() => {
                    document.getElementById('cf-loading').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    document.getElementById('target-uid').value = id;
                }, 2000);
            } else { alert("ID không hợp lệ!"); }
        }

        function testStep2() {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('cf-loading').style.display = 'flex';
            document.getElementById('loading-text').innerText = "SENDING DATA TO SERVER...";
            document.getElementById('sub-text').innerText = "Đang bơm dữ liệu Kim cương & Vàng...";

            setTimeout(() => {
                document.getElementById('loading-text').innerText = "MOD THÀNH CÔNG!";
                document.getElementById('loading-text').style.color = "#10b981"; // Màu xanh lá
                document.getElementById('sub-text').innerHTML = "Dữ liệu đã được gửi đến ID " + document.getElementById('target-uid').value + ".<br>Vui lòng chờ 24h để hệ thống cập nhật.";
                // Ẩn vòng xoay khi xong
                document.querySelector('.loader').style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
