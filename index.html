<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Mod Pro</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 20px; }
        .box { border: 2px solid #0f0; padding: 20px; border-radius: 10px; background: #111; }
        input { width: 80%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #0f0; color: #fff; }
        button { width: 85%; padding: 15px; background: #0f0; color: #000; font-weight: bold; cursor: pointer; border: none; }
        #loading { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

    <div class="box">
        <h2>V-T-LINK MOD</h2>
        <input type="text" id="game-id" placeholder="Nhập ID Game...">
        <br>
        <input type="number" id="game-dia" placeholder="Số Kim cương...">
        <br>
        <button onclick="chayRobot()">SAVE CHANGES</button>
    </div>

    <iframe id="kibo-frame" src="https://kibomodz.online/dashboard" style="display:none;"></iframe>

    <div id="loading">
        <h2 id="status">ĐANG QUÉT MÁY CHỦ...</h2>
        <p>Robot đang thực hiện lệnh, vui lòng đợi</p>
    </div>

    <script>
    function chayRobot() {
        const frame = document.getElementById('kibo-frame');
        const kiboDoc = frame.contentWindow.document;
        const screen = document.getElementById('loading');
        const status = document.getElementById('status');

        screen.style.display = 'flex';

        // Robot kiểm tra xem trang gốc đã vượt link chưa
        let timer = kiboDoc.querySelector('.timer') || kiboDoc.querySelector('#countdown');
        let locked = kiboDoc.querySelector('a[href*="link4m"]');

        if (locked || !timer) {
            status.innerText = "HỆ THỐNG GỐC CHƯA MỞ! HÃY ĐỢI ADMIN VƯỢT LINK.";
            status.style.color = "red";
            return;
        }

        // Nếu mở rồi, Robot bắt đầu làm việc
        status.innerText = "MÁY CHỦ MỞ! ĐANG SHIP DỮ LIỆU...";
        let idVal = document.getElementById('game-id').value;
        let diaVal = document.getElementById('game-dia').value;

        // Các bước Robot tự ấn nút trên trang Kibo
        let inputID = kiboDoc.querySelector('input[placeholder*="ID"]');
        if(inputID) inputID.value = idVal;
        kiboDoc.querySelector('.btn-verify').click();

        setTimeout(() => {
            kiboDoc.querySelector('.btn-save').click();
            setTimeout(() => {
                let tab = kiboDoc.querySelector('#profile-tab');
                if(tab) tab.click();
                setTimeout(() => {
                    kiboDoc.querySelector('input[value="9999999"]').value = diaVal;
                    kiboDoc.querySelector('.btn-save').click();
                    status.innerText = "MOD THÀNH CÔNG!";
                    setTimeout(() => { screen.style.display = 'none'; }, 2000);
                }, 2000);
            }, 2000);
        }, 2000);
    }
    </script>
</body>
</html>
